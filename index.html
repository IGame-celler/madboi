<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/dmad-poki@49b5ab6b987f5f3be58f9dae59c92e8fc1aab9b0/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Drive Mad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="webapp/fancade.css">
  <link rel="icon" href="webapp/favicon.ico">
  <script src="poki-sdk.js"></script>
</head>

<body id="body">

  <!-- Modal dialog div -->
  <div id="modal_parent">
    <div id="modal_content">
      <span id="modal_close_button">&times;</span>
      <div id="store_link_modal_content" class="modal_inner"></div>
      <div id="share_file_modal_content" class="modal_inner"></div>
    </div>
  </div>

  <!-- Game canvas and overlay -->
  <div id="canvas_border" class="emscripten_border">
    <div id="play_content" class="middle center">
      <div class="edge">
        <div class="box">
          <div class="black">
            <img src="webapp/cover.jpg" class="cover">
            <p class="title">Drive Mad</p>
            <p class="author">Fancade</p>
          </div>
        </div>
      </div>
      <div id="progress_or_play">
        <progress id="progress" class="loading" value="0" max="100"></progress>
      </div>
      <p class="description"></p>

      <!-- Button to access new 50 levels -->
      <button onclick="showNewLevelSelect()" style="margin-top:20px;">Play New 50 Levels</button>
    </div>
    <canvas class="emscripten" id="canvas" tabindex=-1></canvas>
    <div id="gradient"></div>
    <div id="webview_content"></div>
  </div>

  <!-- Manual JS, Called from WASM -->
  <script type="text/javascript" src="webapp/source_min.js"></script>

  <!-- Auto generated JS -->
  <script type="text/javascript" src="webapp/index.js"></script>

  <!-- ===== New 50 Levels Menu Overlay ===== -->
  <div id="new_level_select" style="
      display:none;
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background-color: rgba(0,0,0,0.9);
      color:white;
      z-index:9999;
      text-align:center;
      overflow-y:auto;
      padding-top:50px;
  ">
    <h2>New 50 Levels</h2>
    <div id="new_level_buttons" style="
        display:grid;
        grid-template-columns: repeat(5, 1fr);
        gap:10px;
        max-width:600px;
        margin:0 auto;
    ">
      <!-- Buttons generated by JS -->
    </div>
    <button style="margin-top:20px; padding:10px 20px;" onclick="backToMainMenu()">Back</button>
  </div>

  <script>
    // Define the new 50 levels (IDs 200-249)
    const NEW_LEVELS = [];
    for (let i = 200; i < 250; i++) {
      NEW_LEVELS.push({
        id: i,
        name: "Level " + i,
        layout: "layout_data_" + i // REPLACE with your actual level layout data
      });
    }

    // Show the new level select menu
    function showNewLevelSelect() {
      const container = document.getElementById('new_level_buttons');
      container.innerHTML = '';

      NEW_LEVELS.forEach(level => {
        const btn = document.createElement('button');
        btn.innerText = level.name;
        btn.style.padding = "10px";
        btn.style.fontSize = "14px";
        btn.style.cursor = "pointer";
        btn.style.zIndex = "10000"; // Ensure clickable
        btn.onclick = () => loadNewLevel(level.id);
        container.appendChild(btn);
      });

      // Hide main menu
      document.getElementById('play_content').style.display = 'none';
      document.getElementById('new_level_select').style.display = 'block';
    }

    // Back to main menu
    function backToMainMenu() {
      document.getElementById('new_level_select').style.display = 'none';
      document.getElementById('play_content').style.display = 'block';
    }

    // Load a new level
    function loadNewLevel(levelId) {
      const level = NEW_LEVELS.find(l => l.id === levelId);
      if (!level) return;

      // Hide the new level select overlay
      document.getElementById('new_level_select').style.display = 'none';

      // --- REAL LEVEL LOADING ---
      // Replace this with your actual Fancade/WASM level-loading function
      // Example: loadLevel(level.layout);
      if (typeof loadLevel === "function") {
        loadLevel(level.layout); // Your game function
      } else {
        console.log("Game loadLevel() function not found. Level ID:", level.id);
      }
    }

    // OPTIONAL: start first new level automatically for testing
    // Uncomment the next line to auto-start level 200 when opening the menu
    // loadNewLevel(200);
  </script>

</body>
</html>
