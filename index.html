<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Drive Mad – Full 250 Levels</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<link rel="stylesheet" href="webapp/fancade.css">
<link rel="icon" href="webapp/favicon.ico">

<style>
body {
  background-color: #000;
  color: #fff;
  font-family: sans-serif;
  text-align: center;
}

h2 {
  margin: 10px 0;
}

#level-select {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
  gap: 8px;
  padding: 10px;
  max-width: 720px;
  margin: 0 auto 20px;
}

#level-select button {
  height: 50px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 4px;
  border: 2px solid #111;
  background-color: #222;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
}

#level-select button.locked {
  background-color: #111;
  color: #555;
  cursor: not-allowed;
}

#level-select button:hover:not(.locked) {
  background-color: #555;
}

/* Canvas container */
#canvas_border {
  width: 100%;
  max-width: 720px;
  margin: 10px auto;
}
</style>
</head>

<body>

<h2>Drive Mad – Select Level</h2>
<div id="level-select"></div>

<div id="canvas_border" class="emscripten_border">
  <canvas class="emscripten" id="canvas" tabindex=-1></canvas>
  <div id="gradient"></div>
  <div id="webview_content"></div>
</div>

<!-- Original game scripts -->
<script src="webapp/source_min.js"></script>
<script src="webapp/index.js"></script>

<script>
(function(){
  const TOTAL_LEVELS = 250;
  const container = document.getElementById('level-select');

  // Load highest unlocked from localStorage
  let highestUnlocked = parseInt(localStorage.getItem('driveMadUnlocked') || '1');

  function createButton(level) {
    const btn = document.createElement('button');
    btn.textContent = level;
    if(level <= highestUnlocked) {
      btn.disabled = false;
      btn.classList.remove('locked');
    } else {
      btn.disabled = true;
      btn.classList.add('locked');
    }

    btn.onclick = () => {
      if(level <= highestUnlocked) {
        // Load level on original canvas
        if(window.getLevel) window.getLevel(level);

        // Unlock next level after this one
        const next = level + 1;
        if(next <= TOTAL_LEVELS && next > highestUnlocked) {
          highestUnlocked = next;
          localStorage.setItem('driveMadUnlocked', highestUnlocked);
          updateButtons();
        }
      }
    };

    return btn;
  }

  function updateButtons() {
    container.querySelectorAll('button').forEach(btn => {
      const level = parseInt(btn.textContent);
      if(level <= highestUnlocked) {
        btn.disabled = false;
        btn.classList.remove('locked');
      } else {
        btn.disabled = true;
        btn.classList.add('locked');
      }
    });
  }

  function initLevelSelect() {
    for(let i=1;i<=TOTAL_LEVELS;i++) {
      container.appendChild(createButton(i));
    }
  }

  initLevelSelect();
})();
</script>

</body>
</html>
