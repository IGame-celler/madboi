<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Mad 250 Levels</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;background:#111;color:white;}
#levelBar{position:fixed;top:0;left:0;width:100%;background:#222;padding:5px;display:flex;flex-wrap:wrap;z-index:100;}
.levelBtn{margin:2px;padding:5px 8px;border:none;background:#555;color:white;font-size:12px;cursor:pointer;}
.levelBtn.locked{background:#333;color:#777;cursor:not-allowed;}
canvas{display:block;margin-top:60px;background:#222;}
</style>
</head>
<body>

<div id="levelBar"></div>
<canvas id="gameCanvas"></canvas>

<script>
// =====================
// Setup canvas
// =====================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight-60;

// =====================
// Game variables
// =====================
let car = {x:100,y:300,vx:0,vy:0,width:40,height:20,angle:0};
let keys = {};
let currentLevel = 1;
let maxUnlocked = parseInt(localStorage.getItem("driveMadMax")) || 1;

// =====================
// Level definitions
// =====================
let levels = [];

// Levels 1–200: standard ramps
for(let i=1;i<=200;i++){
    levels.push({
        groundY:350 - i*0.2,
        ramps:[{x:300+i*2,width:200,height:50+i*0.1}],
        goal:800+i*5
    });
}

// Levels 201–250: progressively harder
for(let i=201;i<=250;i++){
    levels.push({
        groundY:320 - (i-200)*2,
        ramps:[
            {x:250+(i-200)*10,width:120,height:80+(i-200)*3},
            {x:450+(i-200)*12,width:120,height:120+(i-200)*3},
            {x:650+(i-200)*15,width:120,height:160+(i-200)*3}
        ],
        goal:900 + (i-200)*30
    });
}

// =====================
// Level buttons
// =====================
const levelBar = document.getElementById("levelBar");
for(let i=201;i<=250;i++){
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "levelBtn";
    if(i>maxUnlocked) btn.classList.add("locked");
    btn.onclick = ()=>{
        if(i>maxUnlocked) return;
        currentLevel=i;
        resetCar();
    }
    levelBar.appendChild(btn);
}

function updateButtons(){
    document.querySelectorAll(".levelBtn").forEach(btn=>{
        let lvl=parseInt(btn.innerText);
        if(lvl<=maxUnlocked) btn.classList.remove("locked");
    });
}

// =====================
// Input
// =====================
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// =====================
// Game functions
// =====================
function resetCar(){
    car.x=100;
    car.y=200;
    car.vx=0;
    car.vy=0;
    car.angle=0;
}

const gravity = 0.5;

function update(){
    if(keys["ArrowRight"] || keys["d"]) car.vx+=0.5;
    if(keys["ArrowLeft"] || keys["a"]) car.vx-=0.5;

    car.vy+=gravity;
    car.x+=car.vx;
    car.y+=car.vy;
    car.vx*=0.98;
    
    let lvl = levels[currentLevel-1];

    // Ground collision
    if(car.y>lvl.groundY){
        car.y=lvl.groundY;
        car.vy=0;
    }

    // Ramps
    lvl.ramps.forEach(r=>{
        if(car.x>r.x && car.x<r.x+r.width && car.y>lvl.groundY-r.height){
            car.y=lvl.groundY-r.height;
            car.vy=0;
        }
    });

    // Goal
    if(car.x>lvl.goal){
        if(currentLevel>=maxUnlocked){
            maxUnlocked=currentLevel+1;
            localStorage.setItem("driveMadMax",maxUnlocked);
            updateButtons();
        }
        currentLevel++;
        if(currentLevel>levels.length) currentLevel=levels.length;
        resetCar();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let lvl = levels[currentLevel-1];

    // Ground
    ctx.fillStyle="#666";
    ctx.fillRect(0,lvl.groundY+20,canvas.width,100);

    // Ramps
    ctx.fillStyle="#888";
    lvl.ramps.forEach(r=>{
        ctx.fillRect(r.x,lvl.groundY-r.height,r.width,r.height);
    });

    // Goal
    ctx.fillStyle="lime";
    ctx.fillRect(lvl.goal,lvl.groundY-60,20,60);

    // Car
    ctx.save();
    ctx.translate(car.x,car.y-10);
    ctx.rotate(car.angle);
    ctx.fillStyle="red";
    ctx.fillRect(-car.width/2,-car.height/2,car.width,car.height);
    ctx.restore();
}

// =====================
// Main loop
// =====================
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

resetCar();
loop();
</script>

</body>
</html>
