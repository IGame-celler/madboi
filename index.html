<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Mad – Multi World</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  #top-bar {
    padding: 10px;
  }
  #gameCanvas {
    background: #222;
    border: 3px solid #444;
    display: block;
    margin: 10px auto;
  }
  #status {
    margin-bottom: 10px;
  }
  #world-select, #level-select {
    display: flex;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 10px auto;
    justify-content: center;
  }
  .world-button, .level-button {
    width: 90px;
    height: 60px;
    margin: 5px;
    border-radius: 14px;
    background: #f7d13d;
    border: 4px solid #000;
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 0 #b89b2f;
    transition: transform 0.05s, box-shadow 0.05s, background 0.1s;
  }
  .world-button:hover, .level-button:hover {
    background: #ffdf4d;
  }
  .world-button:active, .level-button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #b89b2f;
  }
  #world-title {
    margin-top: 5px;
    font-size: 18px;
  }
</style>
</head>
<body>

<div id="top-bar">
  <h1>Drive Mad – Multi World</h1>
  <p>Arrow keys: Left = reverse, Right = forward</p>
</div>

<canvas id="gameCanvas" width="900" height="400"></canvas>
<div id="status">Select a world to start.</div>
<div id="world-title"></div>

<div id="world-select"></div>
<div id="level-select"></div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
const {
  Engine,
  Render,
  Runner,
  Bodies,
  Body,
  Composite,
  Constraint,
  Events
} = Matter;

// ----- BASIC SETUP -----
const canvas = document.getElementById("gameCanvas");
const engine = Engine.create();
const world = engine.world;

const render = Render.create({
  canvas: canvas,
  engine: engine,
  options: {
    width: canvas.width,
    height: canvas.height,
    wireframes: false,
    background: "#222"
  }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ----- WORLD + LEVEL DATA -----
const WORLD_DEFS = [
  { id: 1, name: "Classic", theme: "classic" },
  { id: 2, name: "Snow", theme: "snow" },
  { id: 3, name: "Desert", theme: "desert" },
  { id: 4, name: "Neon", theme: "neon" },
  { id: 5, name: "Construction", theme: "construction" },
  { id: 6, name: "Forest", theme: "forest" },
  { id: 7, name: "Frozen", theme: "frozen" },
  { id: 8, name: "Space", theme: "space" }
];

const LEVELS = {}; // { worldId: [ levelConfigs ] }

// generate all levels at startup (256 total)
function generateLevels() {
  WORLD_DEFS.forEach(worldDef => {
    const levels = [];
    const worldId = worldDef.id;
    const theme = worldDef.theme;

    const levelCount = 32; // 32 per world → 256 total

    for (let i = 1; i <= levelCount; i++) {
      const baseLen = 2000 + i * 40;
      const obstacles = [];
      const baseX = 600 + i * 40;

      if (theme === "classic") {
        obstacles.push(
          { type: "box", x: baseX, y: 320, w: 80, h: 40, color: "#555" },
          { type: "ramp", x: baseX + 200, y: 330, w: 200, h: 20, angle: -0.3, color: "#666" }
        );
      } else if (theme === "snow") {
        obstacles.push(
          { type: "box", x: baseX, y: 330, w: 100, h: 30, color: "#dff" },
          { type: "ramp", x: baseX + 220, y: 340, w: 220, h: 20, angle: -0.25, color: "#cff" }
        );
      } else if (theme === "desert") {
        obstacles.push(
          { type: "box", x: baseX, y: 320, w: 90, h: 50, color: "#c96" },
          { type: "box", x: baseX + 180, y: 300, w: 70, h: 70, color: "#b85" }
        );
      } else if (theme === "neon") {
        obstacles.push(
          { type: "box", x: baseX, y: 310, w: 80, h: 40, color: "#0ff" },
          { type: "ramp", x: baseX + 220, y: 320, w: 240, h: 18, angle: -0.35, color: "#f0f" }
        );
      } else if (theme === "construction") {
        obstacles.push(
          { type: "box", x: baseX, y: 310, w: 100, h: 50, color: "#fc3" },
          { type: "box", x: baseX + 200, y: 280, w: 40, h: 100, color: "#964" }
        );
      } else if (theme === "forest") {
        obstacles.push(
          { type: "box", x: baseX, y: 320, w: 90, h: 40, color: "#582" },
          { type: "ramp", x: baseX + 200, y: 330, w: 220, h: 20, angle: -0.3, color: "#7a3" }
        );
      } else if (theme === "frozen") {
        obstacles.push(
          { type: "box", x: baseX, y: 330, w: 100, h: 30, color: "#9ef" },
          { type: "box", x: baseX + 200, y: 300, w: 70, h: 70, color: "#bdf" }
        );
      } else if (theme === "space") {
        obstacles.push(
          { type: "box", x: baseX, y: 310, w: 80, h: 40, color: "#8af" },
          { type: "ramp", x: baseX + 240, y: 320, w: 260, h: 18, angle: -0.4, color: "#f8f" }
        );
      }

      levels.push({
        id: i,
        length: baseLen,
        theme,
        obstacles
      });
    }

    LEVELS[worldId] = levels;
  });
}

generateLevels();

// ----- WORLD + LEVEL UI -----
let currentWorldId = null;
let currentLevelConfig = null;

function createWorldButtons() {
  const container = document.getElementById("world-select");
  container.innerHTML = "";
  WORLD_DEFS.forEach(w => {
    const btn = document.createElement("button");
    btn.className = "world-button";
    btn.textContent = w.name;
    btn.onclick = () => selectWorld(w.id);
    container.appendChild(btn);
  });
}

function selectWorld(worldId) {
  currentWorldId = worldId;
  const worldDef = WORLD_DEFS.find(w => w.id === worldId);
  document.getElementById("world-title").textContent =
    "World: " + worldDef.name;
  document.getElementById("status").textContent =
    "Select a level in " + worldDef.name + ".";
  createLevelButtons(worldId);
}

function createLevelButtons(worldId) {
  const container = document.getElementById("level-select");
  container.innerHTML = "";
  const levels = LEVELS[worldId];
  levels.forEach(lv => {
    const btn = document.createElement("button");
    btn.className = "level-button";
    btn.textContent = lv.id;
    btn.onclick = () => buildLevel(worldId, lv.id);
    container.appendChild(btn);
  });
}

createWorldButtons();

// ----- PHYSICS OBJECTS -----
let carBody = null;
let wheelA = null;
let wheelB = null;
let finishSensor = null;
let ground = null;

function clearWorld() {
  Composite.clear(world, false);
}

function buildLevel(worldId, levelId) {
  clearWorld();

  const levels = LEVELS[worldId];
  const level = levels.find(l => l.id === levelId);
  if (!level) return;
  currentLevelConfig = level;

  const worldDef = WORLD_DEFS.find(w => w.id === worldId);
  document.getElementById("status").textContent =
    `World: ${worldDef.name} – Level ${levelId} – length: ${level.length}`;

  // Background tint by theme
  let bg = "#222";
  if (level.theme === "snow" || level.theme === "frozen") bg = "#223344";
  else if (level.theme === "desert") bg = "#332211";
  else if (level.theme === "neon") bg = "#111122";
  else if (level.theme === "forest") bg = "#112211";
  else if (level.theme === "space") bg = "#000010";
  render.options.background = bg;

  // Ground
  ground = Bodies.rectangle(level.length / 2, 380, level.length, 40, {
    isStatic: true,
    render: { fillStyle: "#333" }
  });
  Composite.add(world, ground);

  // Obstacles
  level.obstacles.forEach(o => {
    if (o.type === "box") {
      const box = Bodies.rectangle(o.x, o.y, o.w, o.h, {
        isStatic: true,
        render: { fillStyle: o.color || "#555" }
      });
      Composite.add(world, box);
    } else if (o.type === "ramp") {
      const ramp = Bodies.rectangle(o.x, o.y, o.w, o.h, {
        isStatic: true,
        angle: o.angle,
        render: { fillStyle: o.color || "#666" }
      });
      Composite.add(world, ramp);
    }
  });

  // Finish line sensor
  finishSensor = Bodies.rectangle(level.length - 100, 320, 40, 120, {
    isStatic: true,
    isSensor: true,
    render: { fillStyle: "#0f0" }
  });
  Composite.add(world, finishSensor);

  // Car (classic Drive Mad style)
  const carX = 200;
  const carY = 320;

  carBody = Bodies.rectangle(carX, carY, 120, 40, {
    density: 0.002,
    friction: 0.8,
    frictionAir: 0.02,
    render: { fillStyle: "#e33" }
  });

  wheelA = Bodies.circle(carX - 40, carY + 25, 20, {
    friction: 1,
    restitution: 0.2,
    render: { fillStyle: "#000" }
  });

  wheelB = Bodies.circle(carX + 40, carY + 25, 20, {
    friction: 1,
    restitution: 0.2,
    render: { fillStyle: "#000" }
  });

  const suspensionA = Constraint.create({
    bodyA: carBody,
    pointA: { x: -40, y: 20 },
    bodyB: wheelA,
    stiffness: 0.4,
    damping: 0.2
  });

  const suspensionB = Constraint.create({
    bodyA: carBody,
    pointA: { x: 40, y: 20 },
    bodyB: wheelB,
    stiffness: 0.4,
    damping: 0.2
  });

  Composite.add(world, [carBody, wheelA, wheelB, suspensionA, suspensionB]);
}

// ----- CAMERA + CONTROLS -----
let keyLeft = false;
let keyRight = false;

window.addEventListener("keydown", e => {
  if (e.code === "ArrowLeft") keyLeft = true;
  if (e.code === "ArrowRight") keyRight = true;
});

window.addEventListener("keyup", e => {
  if (e.code === "ArrowLeft") keyLeft = false;
  if (e.code === "ArrowRight") keyRight = false;
});

Events.on(engine, "beforeUpdate", () => {
  // Camera follow
  if (carBody) {
    const cx = carBody.position.x;
    render.bounds.min.x = cx - canvas.width / 2;
    render.bounds.max.x = cx + canvas.width / 2;
    render.bounds.min.y = 0;
    render.bounds.max.y = canvas.height;
    Render.lookAt(render, render.bounds);
  }

  // Wheel torque
  if (wheelA && wheelB) {
    const torque = 0.0008;
    if (keyRight) {
      Body.setAngularVelocity(wheelA, wheelA.angularVelocity + torque);
      Body.setAngularVelocity(wheelB, wheelB.angularVelocity + torque);
    } else if (keyLeft) {
      Body.setAngularVelocity(wheelA, wheelA.angularVelocity - torque);
      Body.setAngularVelocity(wheelB, wheelB.angularVelocity - torque);
    }
  }
});

// ----- FINISH DETECTION -----
Events.on(engine, "collisionStart", event => {
  const pairs = event.pairs;
  for (let pair of pairs) {
    if (!finishSensor || !carBody) continue;
    if (
      (pair.bodyA === finishSensor && pair.bodyB === carBody) ||
      (pair.bodyB === finishSensor && pair.bodyA === carBody)
    ) {
      const worldDef = WORLD_DEFS.find(w => w.id === currentWorldId);
      document.getElementById("status").textContent =
        `World ${worldDef.name} – Level ${currentLevelConfig.id} complete!`;
    }
  }
});
</script>

</body>
</html>
