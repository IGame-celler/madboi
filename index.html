<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Mad Mod</title>

<style>

body{
margin:0;
overflow:hidden;
}

#game-container{
width:100vw;
height:100vh;
}

#levelBar{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:4px;
display:flex;
flex-wrap:wrap;
z-index:999;
}

.levelBtn{
margin:2px;
padding:4px 7px;
border:none;
background:#444;
color:white;
font-size:12px;
cursor:pointer;
}

.levelBtn.locked{
background:#222;
color:#777;
cursor:not-allowed;
}

</style>
</head>

<body>

<div id="levelBar"></div>
<div id="game-container"></div>

<script src="source_min.js"></script>

<script>

// progress
let maxUnlocked = localStorage.getItem("driveMadLevel") || 1
maxUnlocked = parseInt(maxUnlocked)

const bar = document.getElementById("levelBar")

// create 250 level buttons
for(let i=1;i<=250;i++){

let btn=document.createElement("button")
btn.textContent=i
btn.className="levelBtn"

if(i>maxUnlocked) btn.classList.add("locked")

btn.onclick=()=>{

if(i>maxUnlocked) return

loadLevel(i)

}

bar.appendChild(btn)

}

// load level patch
function loadLevel(level){

console.log("Loading level",level)

/*
Hook into original game
*/

if(window.game){

game.loadLevel?.(level)

}

}

// level complete hook
function beatLevel(level){

if(level>=maxUnlocked){

maxUnlocked=level+1

localStorage.setItem("driveMadLevel",maxUnlocked)

document.querySelectorAll(".levelBtn").forEach(btn=>{
if(parseInt(btn.textContent)<=maxUnlocked)
btn.classList.remove("locked")
})

}

}

// start game
const game = new DriveMadGame({

container: document.getElementById("game-container"),
wasmPath: "source.wasm",
jsPath: "source.js",

onLoad: ()=>{

console.log("Drive Mad loaded")

window.game=game

}

})

</script>

</body>
</html>
