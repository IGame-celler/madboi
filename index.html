<!DOCTYPE html>
<html lang="en-us">

<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/dmad-poki@49b5ab6b987f5f3be58f9dae59c92e8fc1aab9b0/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Drive Mad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="webapp/fancade.css">
  <link rel="icon" href="webapp/favicon.ico">
  <script src="poki-sdk.js"></script>
</head>

<body id="body">

  <!-- Modal dialog div -->
  <div id="modal_parent">
    <div id="modal_content">
      <span id="modal_close_button">&times;</span>
      <div id="store_link_modal_content" class="modal_inner"></div>
      <div id="share_file_modal_content" class="modal_inner"></div>
    </div>
  </div>

  <!-- Game canvas and overlay -->
  <div id="canvas_border" class="emscripten_border">
    <div id="play_content" class="middle center">
      <div class="edge">
        <div class="box">
          <div class="black">
            <img src="webapp/cover.jpg" class="cover">
            <p class="title">Drive Mad</p>
            <p class="author">Fancade</p>
          </div>
        </div>
      </div>
      <div id="progress_or_play">
        <progress id="progress" class="loading" value="0" max="100"></progress>
      </div>
      <p class="description"></p>
    </div>
    <canvas class="emscripten" id="canvas" tabindex=-1></canvas>
    <div id="gradient"></div>
    <div id="webview_content"></div>
  </div>

  <!-- Manual JS, Called from WASM -->
  <script type="text/javascript" src="webapp/source_min.js"></script>

  <!-- Auto generated JS -->
  <script type="text/javascript" src="webapp/index.js"></script>

  <!-- ===== Floating 50 Level Buttons Toolbar ===== -->
  <div id="floating_level_toolbar" style="
      position:fixed;
      top:0;
      left:0;
      width:100%;
      background-color: rgba(0,0,0,0.85);
      color:white;
      display:flex;
      flex-wrap:wrap;
      gap:5px;
      padding:5px;
      z-index:10000;
      max-height: 90px;
      overflow-x: auto;
      overflow-y: hidden;
  ">
    <!-- Buttons generated dynamically -->
  </div>

  <script>
    // ----- Progress Saving System -----
    function getPlayerProgress() {
      const saved = localStorage.getItem("drive_mad_progress");
      if (saved) return parseInt(saved, 10);
      localStorage.setItem("drive_mad_progress", "1");
      return 1;
    }

    function saveProgress(levelNumber) {
      let saved = parseInt(localStorage.getItem("drive_mad_progress") || "1", 10);
      if (levelNumber + 1 > saved) {
        localStorage.setItem("drive_mad_progress", (levelNumber + 1).toString());
      }
    }

    function onLevelComplete(levelNumber) {
      saveProgress(levelNumber);
    }

    // ----- Wait for loadLevel and levels to exist before starting -----
    function waitForGameReady(callback) {
      const interval = setInterval(() => {
        if (typeof levels !== "undefined" && typeof loadLevel === "function") {
          clearInterval(interval);
          callback();
        }
      }, 50);
    }

    // ----- Floating 50 Test Level Buttons -----
    document.addEventListener("DOMContentLoaded", () => {
      waitForGameReady(() => {
        // ----- Floating toolbar -----
        const toolbar = document.getElementById("floating_level_toolbar");
        for (let i = 0; i < 50; i++) {
          const btn = document.createElement("button");
          const levelId = 200 + i;
          btn.innerText = levelId;
          btn.style.padding = "4px 8px";
          btn.style.fontSize = "12px";
          btn.style.cursor = "pointer";

          const layoutIndex = i % levels.length;

          btn.onclick = () => {
            if (levels[layoutIndex]) loadLevel(levels[layoutIndex]);
          };

          toolbar.appendChild(btn);
        }

        // ----- Load player progress -----
        const startLevelIndex = getPlayerProgress() - 1;
        if (levels[startLevelIndex]) {
          loadLevel(levels[startLevelIndex]);
        }
      });
    });

    // Expose globally if needed
    window.getPlayerProgress = getPlayerProgress;
    window.saveProgress = saveProgress;
    window.onLevelComplete = onLevelComplete;
  </script>

</body>
</html>
