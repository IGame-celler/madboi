<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DRIVE MAD 2.0</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 2.0 HUD Overlay */
        #v2-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 5px solid #00ffcc; box-sizing: border-box;
            z-index: 10; opacity: 0.3;
        }

        #title-card {
            position: absolute; top: 20px; left: 20px; z-index: 20;
            color: #00ffcc; font-weight: 999; font-size: 24px;
            text-shadow: 0 0 10px #00ffcc; letter-spacing: 2px;
        }

        .skip-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 100;
            background: #00ffcc; color: #000; border: none; padding: 15px 25px;
            font-weight: bold; cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px #00ffcc; transition: 0.3s;
            pointer-events: auto;
        }
        .skip-btn:hover { transform: scale(1.1); background: #fff; }

        #status {
            position: absolute; bottom: 35px; left: 30px; color: #00ffcc;
            font-size: 12px; z-index: 20; font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="v2-overlay"></div>
    <div id="title-card">DRIVE MAD 2.0</div>
    <div id="status">SYSTEM: ONLINE | PHYSICS: STABLE | MODE: BIG BOI</div>
    
    <!-- Level Skip Injector -->
    <button class="skip-btn" onclick="triggerSkip()">NEXT LEVEL ➔</button>

    <!-- High-Speed Game Server -->
    <iframe id="game-frame" src="https://fancade.com" allowfullscreen></iframe>

    <script>
        function triggerSkip() {
            // Emulates the Debug-Skip used in Drive Mad 2.0 development
            const frame = document.getElementById('game-frame').contentWindow;
            frame.postMessage({ type: 'keydown', keyCode: 39 }, '*');
            console.log("Drive Mad 2.0: Skipping to next level...");
        }

        // Auto-focus the game so you don't have to click twice
        window.onload = function() {
            document.getElementById('game-frame').focus();
        };
    </script>
</body>
</html>
