<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Drive Mad – 250 Levels</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

canvas{
border:2px solid #333;
}
</style>

</head>

<body>

<canvas id="canvas" width="960" height="600"></canvas>

<script>

/* ---------------------------
Generate levels 201–250
--------------------------- */

const CUSTOM_LEVELS=[];

for(let i=201;i<=250;i++){

CUSTOM_LEVELS.push({

id:i,

objects:[

{type:"start",x:0,y:0},

{type:"ramp",x:6,y:0,angle:20+(i%15)},

{type:"gap",x:10,width:4+(i%6)},

{type:"platform",x:18,y:2,length:6},

{type:"goal",x:30,y:0}

]

});

}

/* ---------------------------
Load original engine
(no Poki SDK)
--------------------------- */

var Module={
canvas:document.getElementById("canvas")
};

function loadScript(src){
let s=document.createElement("script");
s.src=src;
document.body.appendChild(s);
}

loadScript("https://cdn.jsdelivr.net/gh/genizy/dmad-poki/webapp/source_min.js");
loadScript("https://cdn.jsdelivr.net/gh/genizy/dmad-poki/webapp/index.js");

/* ---------------------------
Override levels
--------------------------- */

setTimeout(()=>{

if(window.getLevel){

const original=window.getLevel;

window.getLevel=function(id){

if(id<=200){
return original(id);
}

return CUSTOM_LEVELS.find(l=>l.id===id);

};

}

window.TOTAL_LEVELS=250;

},3000);

</script>

</body>
</html>
