<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Drive Mad 2.0</title>
  <base href="https://cdn.jsdelivr.net/gh/genizy/dmad-poki@49b5ab6b987f5f3be58f9dae59c92e8fc1aab9b0/">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" href="webapp/fancade.css">
  <style>
    body { background: #000; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
    #cheat-panel {
      position: absolute; bottom: 20px; right: 20px; z-index: 1000;
      background: rgba(0, 0, 0, 0.8); color: #0f0; padding: 10px;
      border: 2px solid #0f0; font-family: monospace; border-radius: 5px;
    }
    button { background: #0f0; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
    button:hover { background: #fff; }
  </style>
</head>
<body id="body">

  <div id="cheat-panel">
    <div>BIG BOI CHEATS</div>
    <button onclick="skipLevel()">SKIP LEVEL (→)</button>
    <div style="font-size: 10px; margin-top: 5px;">HACK: PRESS ARROW KEYS WHILE PAUSED</div>
  </div>

  <div id="canvas_border" class="emscripten_border">
    <div id="play_content" class="middle center">
      <div class="edge">
        <div class="box">
          <div class="black">
            <img src="webapp/cover.jpg" class="cover">
            <p class="title" id="game-title">DRIVE MAD</p>
            <p class="author">BIG BOI EDITION</p>
          </div>
        </div>
      </div>
      <div id="progress_or_play">
        <progress id="progress" class="loading" value="0" max="100"></progress>
      </div>
    </div>
    <canvas class="emscripten" id="canvas" tabindex=-1></canvas>
  </div>

  <!-- Main Game Scripts -->
  <script src="poki-sdk.js"></script>
  <script src="webapp/source_min.js"></script>
  <script src="webapp/index.js"></script>

  <script>
    // THE SECRET LEVEL SKIP HACK
    // Many versions of Fancade/Drive Mad allow skipping via keyboard input 
    // when certain memory flags are toggled.
    function skipLevel() {
      console.log("Big Boi Hack: Attempting level skip...");
      // Simulate the 'Right Arrow' key press which skips levels in debug mode
      const event = new KeyboardEvent('keydown', {'keyCode': 39, 'which': 39});
      document.dispatchEvent(event);
      alert("Level Skipped! (If it didn't work, pause the game first then try)");
    }

    // Visual Polish
    window.addEventListener('load', () => {
      setTimeout(() => {
        const title = document.getElementById('game-title');
        if(title) title.innerText = "DRIVE MAD 2.0";
      }, 2000);
    });
  </script>
</body>
</html>
