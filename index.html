<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drive Mad 250-Level</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;font-family:Arial,sans-serif;background:#111;color:white;}
#levelBar{position:fixed;top:0;left:0;width:100%;background:#222;padding:5px;display:flex;flex-wrap:wrap;z-index:10;}
.levelBtn{margin:2px;padding:5px 8px;border:none;background:#555;color:white;font-size:12px;cursor:pointer;}
.levelBtn.locked{background:#333;color:#777;cursor:not-allowed;}
canvas{display:block;margin-top:60px;background:#222;}
</style>
</head>
<body>

<div id="levelBar"></div>
<canvas id="gameCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>

// =====================
// Scene Setup
// =====================
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(0,50,150);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight-50);
document.body.appendChild(renderer.domElement);

// =====================
// Lights
// =====================
let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(100,200,100);
scene.add(light);
scene.add(new THREE.AmbientLight(0x888888));

// =====================
// Car
// =====================
let carGeom = new THREE.BoxGeometry(10,5,5);
let carMat = new THREE.MeshStandardMaterial({color:0xff0000});
let car = new THREE.Mesh(carGeom,carMat);
car.position.set(0,5,0);
scene.add(car);

// =====================
// Ground
// =====================
let groundGeom = new THREE.BoxGeometry(1000,2,50);
let groundMat = new THREE.MeshStandardMaterial({color:0x444444});
let ground = new THREE.Mesh(groundGeom,groundMat);
ground.position.set(500,0,0);
scene.add(ground);

// =====================
// Game variables
// =====================
let currentLevel = 1;
let maxUnlocked = parseInt(localStorage.getItem("driveMad3DMax")) || 1;
let keys = {};

// =====================
// Levels
// =====================
let levels = [];

// --- Original 200 levels ---
// You can replace this with the original level array if available
for(let i=1;i<=200;i++){
    levels.push({
        ramps:[{x:300+i*2,y:2,width:50,height:10}],
        goalX:800+i*5
    });
}

// --- New 50 levels (201-250) ---
for(let i=201;i<=250;i++){
    levels.push({
        ramps:[
            {x:250+(i-200)*10,y:2,width:60,height:15+(i-200)},
            {x:450+(i-200)*12,y:2,width:70,height:20+(i-200)}
        ],
        goalX:900+(i-200)*30
    });
}

// =====================
// Top buttons (201-250)
// =====================
const levelBar = document.getElementById("levelBar");
for(let i=201;i<=250;i++){
    let btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "levelBtn";
    if(i>maxUnlocked) btn.classList.add("locked");
    btn.onclick = ()=>{
        if(i>maxUnlocked) return;
        currentLevel=i;
        resetCar();
    }
    levelBar.appendChild(btn);
}

function updateButtons(){
    document.querySelectorAll(".levelBtn").forEach(b=>{
        let lvl=parseInt(b.innerText);
        if(lvl<=maxUnlocked) b.classList.remove("locked");
    });
}

// =====================
// Controls
// =====================
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// =====================
// Physics
// =====================
let gravity=-0.5;

function resetCar(){
    car.position.set(0,5,0);
    car.velocity = new THREE.Vector3(0,0,0);
}

resetCar();

// =====================
// Game Loop
// =====================
let rampMeshes=[];
function drawLevel(){
    rampMeshes.forEach(m=>scene.remove(m));
    rampMeshes=[];

    let lvl = levels[currentLevel-1];
    lvl.ramps.forEach(r=>{
        let g = new THREE.BoxGeometry(r.width,r.height,50);
        let m = new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x888888}));
        m.position.set(r.x,r.height/2,0);
        scene.add(m);
        rampMeshes.push(m);
    });

    // Goal
    let goalGeom = new THREE.BoxGeometry(10,20,50);
    let goalMat = new THREE.MeshStandardMaterial({color:0x00ff00});
    let goalMesh = new THREE.Mesh(goalGeom,goalMat);
    goalMesh.position.set(lvl.goalX,10,0);
    scene.add(goalMesh);
    rampMeshes.push(goalMesh);
}

function update(){
    if(!car.velocity) car.velocity=new THREE.Vector3(0,0,0);
    if(keys["ArrowRight"]||keys["d"]) car.velocity.x+=0.5;
    if(keys["ArrowLeft"]||keys["a"]) car.velocity.x-=0.5;
    car.velocity.y+=gravity;

    car.position.add(car.velocity);

    // Ground collision
    if(car.position.y<5){ car.position.y=5; car.velocity.y=0; }

    // Goal check
    let lvl = levels[currentLevel-1];
    if(car.position.x>lvl.goalX){
        if(currentLevel>=maxUnlocked){
            maxUnlocked=currentLevel+1;
            localStorage.setItem("driveMad3DMax",maxUnlocked);
            updateButtons();
        }
        currentLevel++;
        if(currentLevel>levels.length) currentLevel=levels.length;
        resetCar();
    }
}

// =====================
// Animate
// =====================
function animate(){
    requestAnimationFrame(animate);
    update();
    drawLevel();
    camera.position.x=car.position.x+150;
    camera.lookAt(car.position.x,car.position.y,0);
    renderer.render(scene,camera);
}

animate();

</script>
</body>
</html>
