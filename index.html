<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Drive Mad 250 – Matter.js Edition</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  #top-bar {
    padding: 10px;
  }
  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #gameCanvas {
    background: #222;
    border: 3px solid #444;
    display: block;
    margin-bottom: 10px;
  }
  #status {
    margin-bottom: 10px;
  }
  #level-select {
    display: flex;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 10px auto 20px;
    justify-content: center;
  }
  .level-button {
    width: 60px;
    height: 60px;
    margin: 5px;
    border-radius: 14px;
    background: #f7d13d;
    border: 4px solid #000;
    color: #000;
    font-weight: bold;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 0 #b89b2f;
    transition: transform 0.05s, box-shadow 0.05s, background 0.1s;
  }
  .level-button:hover {
    background: #ffdf4d;
  }
  .level-button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #b89b2f;
  }
</style>
</head>
<body>

<div id="top-bar">
  <h1>Drive Mad 250 – Matter.js Edition</h1>
  <p>Arrow keys: Left = reverse, Right = forward</p>
</div>

<div id="game-container">
  <canvas id="gameCanvas" width="900" height="400"></canvas>
  <div id="status">No level loaded yet.</div>
</div>

<div id="level-select"></div>
