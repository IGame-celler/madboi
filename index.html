<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Drive Mad – 250 Levels (External Selector)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<link rel="icon" href="webapp/favicon.ico">
<link rel="stylesheet" href="webapp/fancade.css">

<style>
/* Full-page background using original game cover */
body {
  margin: 0;
  padding: 0;
  background: url('webapp/cover.jpg') no-repeat center center fixed;
  background-size: cover;
  font-family: sans-serif;
  color: #fff;
  text-align: center;
}

/* Semi-transparent overlay for level select */
#level-select {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
  gap: 8px;
  max-width: 720px;
  margin: 15px auto;
}

/* Level buttons */
#level-select button {
  height: 50px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 4px;
  border: 2px solid #444;
  background-color: #1c1c1c;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
}

#level-select button:hover:not(.locked) {
  background-color: #555;
}

#level-select button.locked {
  background-color: #111;
  color: #555;
  cursor: not-allowed;
}

/* Canvas container */
#canvas_border {
  width: 100%;
  max-width: 720px;
  margin: 10px auto;
}
</style>
</head>

<body>
<h2>Drive Mad – Select Level</h2>
<div id="level-select"></div>

<div id="canvas_border" class="emscripten_border">
  <canvas class="emscripten" id="canvas" tabindex=-1></canvas>
  <div id="gradient"></div>
  <div id="webview_content"></div>
</div>

<!-- Original game scripts -->
<script src="webapp/source_min.js"></script>
<script src="webapp/index.js"></script>

<script>
(function(){
  const TOTAL_LEVELS = 250;
  const container = document.getElementById('level-select');

  // Highest unlocked level stored in localStorage
  let highestUnlocked = parseInt(localStorage.getItem('driveMadUnlocked') || '1');

  function createButton(level) {
    const btn = document.createElement('button');
    btn.textContent = level;
    if(level <= highestUnlocked){
      btn.disabled = false;
      btn.classList.remove('locked');
    } else {
      btn.disabled = true;
      btn.classList.add('locked');
    }

    btn.onclick = () => {
      if(level <= highestUnlocked && window.getLevel){
        // Play level on original canvas
        window.getLevel(level);

        // Unlock next level after current
        const next = level + 1;
        if(next <= TOTAL_LEVELS && next > highestUnlocked){
          highestUnlocked = next;
          localStorage.setItem('driveMadUnlocked', highestUnlocked);
          updateButtons();
        }
      }
    };

    return btn;
  }

  function updateButtons(){
    container.querySelectorAll('button').forEach(btn => {
      const level = parseInt(btn.textContent);
      if(level <= highestUnlocked){
        btn.disabled = false;
        btn.classList.remove('locked');
      } else {
        btn.disabled = true;
        btn.classList.add('locked');
      }
    });
  }

  function initLevelSelect(){
    for(let i=1;i<=TOTAL_LEVELS;i++){
      container.appendChild(createButton(i));
    }
  }

  initLevelSelect();
})();
</script>

</body>
</html>
